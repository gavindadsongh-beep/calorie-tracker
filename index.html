<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gavin's Calorie Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f5f5f0;
    font-family: Georgia, serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 28px 20px 20px;
    border-bottom: 1px solid #1e3a5f;
  }
  .header-inner { max-width: 480px; margin: 0 auto; }
  .label { font-size: 11px; letter-spacing: 4px; color: #4a9eff; text-transform: uppercase; margin-bottom: 4px; }
  .greeting { font-size: 22px; font-weight: bold; color: #fff; }
  .date { font-size: 13px; color: #8899aa; margin-top: 2px; }
  .stats-row { display: flex; align-items: center; gap: 24px; margin-top: 24px; }
  .ring-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-pct { font-size: 16px; font-weight: bold; }
  .stat-boxes { flex: 1; }
  .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .stat-box { text-align: center; }
  .stat-val { font-size: 18px; font-weight: bold; }
  .stat-unit { font-size: 9px; color: #556; text-transform: uppercase; letter-spacing: 1px; }
  .stat-lbl { font-size: 10px; color: #667; }
  .warning { font-size: 11px; border-radius: 6px; padding: 5px 10px; }
  .warn-over { color: #ef4444; background: #2d0a0a; }
  .warn-low { color: #f59e0b; background: #2d1f0a; }

.main { max-width: 480px; margin: 0 auto; padding: 0 16px; }
.tabs { display: flex; gap: 8px; padding: 16px 0 0; }
.tab-btn {
flex: 1; padding: 10px 0; border-radius: 10px; border: none; cursor: pointer;
font-family: Georgia, serif; font-size: 13px; font-weight: bold; letter-spacing: 1px;
transition: all 0.2s;
}
.tab-btn.active { background: #4a9eff; color: #fff; }
.tab-btn.inactive { background: #1a1a2e; color: #4a9eff; }

.section { margin-top: 16px; }
.meal-slots { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.slot-btn {
padding: 7px 14px; border-radius: 20px; border: 1px solid;
font-size: 12px; cursor: pointer; font-family: Georgia, serif; transition: all 0.2s;
}
.slot-btn.active { border-color: #4a9eff; background: #0d2a4a; color: #4a9eff; }
.slot-btn.inactive { border-color: #1e3a5f; background: transparent; color: #556; }

.card {
background: #111827; border-radius: 12px; padding: 16px;
border: 1px solid #1e3a5f; margin-bottom: 16px;
}
.card-label { font-size: 11px; color: #4a9eff; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
input, textarea {
width: 100%; background: #0a0a0a; border: 1px solid #1e3a5f;
border-radius: 8px; padding: 10px 12px; color: #f5f5f0;
font-family: Georgia, serif; font-size: 14px; margin-bottom: 8px;
}
textarea { resize: none; }
.input-row { display: flex; gap: 8px; }
.input-row input { margin-bottom: 0; }
.btn {
background: #4a9eff; border: none; border-radius: 8px;
padding: 10px 18px; color: #fff; font-size: 14px; cursor: pointer;
font-family: Georgia, serif; font-weight: bold; transition: background 0.2s;
}
.btn:disabled { background: #1e3a5f; cursor: not-allowed; }
.btn-full { width: 100%; padding: 12px 0; margin-top: 4px; }

.food-list { display: flex; flex-direction: column; gap: 8px; }
.food-item {
display: flex; align-items: center; justify-content: space-between;
background: #111827; border: 1px solid #1e3a5f; border-radius: 10px;
padding: 12px 14px; cursor: pointer; color: #f5f5f0;
font-family: Georgia, serif; text-align: left; transition: border-color 0.2s;
width: 100%;
}
.food-item:hover { border-color: #4a9eff; }
.food-cal { color: #4a9eff; font-size: 13px; }

.empty { text-align: center; color: #334; padding: 40px 0; font-size: 15px; }
.empty span { font-size: 13px; color: #4a9eff; }

.slot-group { margin-bottom: 20px; }
.slot-header { font-size: 11px; color: #4a9eff; letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; }
.log-item {
display: flex; justify-content: space-between; align-items: center;
background: #111827; border-radius: 10px; padding: 12px 14px;
margin-bottom: 6px; border: 1px solid #1e3a5f;
}
.log-item-right { display: flex; align-items: center; gap: 10px; }
.remove-btn {
background: none; border: none; color: #ef4444;
cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1;
}

.ai-hint { font-size: 12px; color: #556; margin-bottom: 12px; }
.ai-response {
background: #0d2a4a; border-radius: 12px; padding: 16px;
border: 1px solid #4a9eff; font-size: 14px; line-height: 1.7;
color: #d0e8ff; white-space: pre-wrap; margin-top: 12px;
}
.ai-resp-label { font-size: 11px; color: #4a9eff; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }

.toast {
position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
border-radius: 10px; padding: 12px 20px; font-size: 14px;
z-index: 999; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
animation: fadein 0.3s ease;
}
.toast.success { background: #0d2a4a; border: 1px solid #4a9eff; color: #f5f5f0; }
.toast.error { background: #2d0a0a; border: 1px solid #ef4444; color: #f5f5f0; }
@keyframes fadein { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.hidden { display: none; }
.history-day { background: #111827; border: 1px solid #1e3a5f; border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
.history-day-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
.history-day-date { font-size: 14px; font-weight: bold; color: #f5f5f0; }
.history-day-total { font-size: 13px; color: #4a9eff; }
.history-day-bar { height: 4px; background: #1e3a5f; margin: 0 16px 14px; border-radius: 2px; }
.history-day-bar-fill { height: 4px; border-radius: 2px; transition: width 0.5s ease; }
.history-day-meals { padding: 0 16px 14px; display: none; }
.history-day-meals.open { display: block; }
.history-slot-label { font-size: 10px; color: #4a9eff; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0 6px; }
.history-item { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #1e3a5f; color: #ccc; }
.history-item:last-child { border-bottom: none; }
</style>

</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="label">Daily Tracker</div>
    <div class="greeting">Hey Gavin 👋</div>
    <div class="date" id="date-display"></div>
    <div class="stats-row">
      <div class="ring-wrap">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#1e3a5f" stroke-width="8"/>
          <circle id="ring" cx="45" cy="45" r="38" fill="none" stroke="#22c55e" stroke-width="8"
            stroke-dasharray="238.76" stroke-dashoffset="238.76"
            stroke-linecap="round" transform="rotate(-90 45 45)"
            style="transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ring-pct" style="color:#22c55e">0%</div>
        </div>
      </div>
      <div class="stat-boxes">
        <div class="stat-row">
          <div class="stat-box">
            <div class="stat-val" id="stat-consumed" style="color:#4a9eff">0</div>
            <div class="stat-unit">kcal</div>
            <div class="stat-lbl">Consumed</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="stat-remaining" style="color:#22c55e">1950</div>
            <div class="stat-unit">kcal</div>
            <div class="stat-lbl">Remaining</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:#8899aa">1950</div>
            <div class="stat-unit">kcal</div>
            <div class="stat-lbl">Goal</div>
          </div>
        </div>
        <div id="warning-box"></div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="tabs" style="flex-wrap:wrap;">
    <button class="tab-btn active" onclick="switchTab('log')" style="flex:1;min-width:80px;font-size:12px;">➕ Add</button>
    <button class="tab-btn inactive" onclick="switchTab('today')" style="flex:1;min-width:80px;font-size:12px;">📋 Today</button>
    <button class="tab-btn inactive" onclick="switchTab('history')" style="flex:1;min-width:80px;font-size:12px;">📅 History</button>
    <button class="tab-btn inactive" onclick="switchTab('ai')" style="flex:1;min-width:80px;font-size:12px;">🤖 AI</button>
  </div>

  <!-- LOG TAB -->

  <div id="tab-log" class="section">
    <div class="meal-slots" id="meal-slots"></div>
    <div class="card">
      <div class="card-label">Custom Entry</div>
      <input type="text" id="custom-name" placeholder="Food name..."/>
      <div class="input-row">
        <input type="number" id="custom-cals" placeholder="Calories (kcal)" style="margin-bottom:0"/>
        <button class="btn" onclick="addCustom()">Add</button>
      </div>
    </div>
    <div class="card-label">Quick Add — Ghanaian Foods</div>
    <div class="food-list" id="quick-foods"></div>
  </div>

  <!-- TODAY TAB -->

  <div id="tab-today" class="section hidden">
    <div id="today-content"></div>
  </div>

  <!-- HISTORY TAB -->

  <div id="tab-history" class="section hidden">
    <div id="history-content"></div>
  </div>

  <!-- AI TAB -->

  <div id="tab-ai" class="section hidden">
    <div class="card">
      <div class="card-label">Ask Your Nutrition Assistant</div>
      <div class="ai-hint">e.g. "What should I eat for dinner?", "How many calories in jollof rice?", "Am I on track today?"</div>
      <textarea id="ai-input" rows="3" placeholder="Ask anything about your calories or diet..."></textarea>
      <button class="btn btn-full" id="ai-btn" onclick="askAI()">Ask AI 🤖</button>
    </div>
    <div id="ai-response-box" class="hidden">
      <div class="ai-response">
        <div class="ai-resp-label">AI Response</div>
        <div id="ai-response-text"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const DAILY_GOAL = 1950;
const MEAL_SLOTS = ["Breakfast", "Lunch", "Dinner", "Snack"];
const QUICK_FOODS = [
  { name: "Boiled Egg", calories: 78, emoji: "🥚" },
  { name: "Oats (1 cup)", calories: 150, emoji: "🥣" },
  { name: "Grilled Chicken (150g)", calories: 248, emoji: "🍗" },
  { name: "Grilled Fish (150g)", calories: 185, emoji: "🐟" },
  { name: "Boiled Yam (1 cup)", calories: 177, emoji: "🍠" },
  { name: "Plain Rice (1 cup)", calories: 206, emoji: "🍚" },
  { name: "Beans (1 cup)", calories: 227, emoji: "🫘" },
  { name: "Boiled Plantain (1 medium)", calories: 122, emoji: "🍌" },
  { name: "Fufu (medium ball)", calories: 330, emoji: "🍲" },
  { name: "Banku (medium ball)", calories: 290, emoji: "🍲" },
  { name: "Kenkey (1 piece)", calories: 270, emoji: "🌽" },
  { name: "Avocado (half)", calories: 120, emoji: "🥑" },
  { name: "Tomato (medium)", calories: 22, emoji: "🍅" },
  { name: "Groundnuts (small handful)", calories: 160, emoji: "🥜" },
  { name: "Banana (medium)", calories: 105, emoji: "🍌" },
  { name: "Orange (medium)", calories: 62, emoji: "🍊" },
  { name: "Plain Yogurt (200g)", calories: 120, emoji: "🥛" },
  { name: "Kontomire Stew (1 serving)", calories: 180, emoji: "🥬" },
  { name: "Light Soup (1 bowl)", calories: 150, emoji: "🍜" },
  { name: "Kelewele (small portion)", calories: 200, emoji: "🍢" },
];

let meals = JSON.parse(localStorage.getItem("meals") || "[]");
let selectedMeal = "Breakfast";
let currentTab = "log";

function today() {
  return new Date().toLocaleDateString("en-GB");
}

function saveMeals() {
  localStorage.setItem("meals", JSON.stringify(meals));
}

function todayMeals() {
  return meals.filter(m => m.date === today());
}

function totalToday() {
  return todayMeals().reduce((s, m) => s + m.calories, 0);
}

function updateStats() {
  const total = totalToday();
  const remaining = DAILY_GOAL - total;
  const pct = Math.min((total / DAILY_GOAL) * 100, 100);
  const color = pct >= 100 ? "#ef4444" : pct >= 80 ? "#f59e0b" : "#22c55e";
  const circumference = 2 * Math.PI * 38;

  document.getElementById("stat-consumed").textContent = total;
  document.getElementById("stat-remaining").textContent = Math.max(remaining, 0);
  document.getElementById("stat-remaining").style.color = remaining < 0 ? "#ef4444" : "#22c55e";
  document.getElementById("ring-pct").textContent = Math.round(pct) + "%";
  document.getElementById("ring-pct").style.color = color;
  document.getElementById("ring").style.strokeDashoffset = circumference * (1 - pct / 100);
  document.getElementById("ring").style.stroke = color;

  const wb = document.getElementById("warning-box");
  if (remaining < 0) {
    wb.innerHTML = `<div class="warning warn-over">⚠️ Over by ${Math.abs(remaining)} kcal today</div>`;
  } else if (remaining < 300) {
    wb.innerHTML = `<div class="warning warn-low">⚡ Only ${remaining} kcal left — go light!</div>`;
  } else {
    wb.innerHTML = "";
  }
}

function renderMealSlots() {
  const container = document.getElementById("meal-slots");
  container.innerHTML = MEAL_SLOTS.map(slot => `
    <button class="slot-btn ${slot === selectedMeal ? 'active' : 'inactive'}" onclick="selectMeal('${slot}')">${slot}</button>
  `).join("");
}

function selectMeal(slot) {
  selectedMeal = slot;
  renderMealSlots();
}

function renderQuickFoods() {
  document.getElementById("quick-foods").innerHTML = QUICK_FOODS.map((f, i) => `
    <button class="food-item" onclick="addQuick(${i})">
      <span>${f.emoji} ${f.name}</span>
      <span class="food-cal">${f.calories} kcal</span>
    </button>
  `).join("");
}

function addQuick(index) {
  const food = QUICK_FOODS[index];
  meals.push({ ...food, meal: selectedMeal, date: today(), id: Date.now() });
  saveMeals();
  updateStats();
  renderToday();
  showToast(`${food.emoji} ${food.name} added!`, "success");
}

function addCustom() {
  const name = document.getElementById("custom-name").value.trim();
  const cals = Number(document.getElementById("custom-cals").value);
  if (!name || !cals || isNaN(cals)) return;
  meals.push({ name, calories: cals, emoji: "✏️", meal: selectedMeal, date: today(), id: Date.now() });
  saveMeals();
  updateStats();
  renderToday();
  showToast(`✏️ ${name} added!`, "success");
  document.getElementById("custom-name").value = "";
  document.getElementById("custom-cals").value = "";
}

function removeItem(id) {
  meals = meals.filter(m => m.id !== id);
  saveMeals();
  updateStats();
  renderToday();
}

function renderToday() {
  const tm = todayMeals();
  const container = document.getElementById("today-content");
  if (tm.length === 0) {
    container.innerHTML = `<div class="empty">No food logged yet today.<br><span>Go to Add Food to get started.</span></div>`;
    return;
  }
  container.innerHTML = MEAL_SLOTS.map(slot => {
    const items = tm.filter(m => m.meal === slot);
    if (items.length === 0) return "";
    const slotTotal = items.reduce((s, i) => s + i.calories, 0);
    return `
      <div class="slot-group">
        <div class="slot-header">${slot} — ${slotTotal} kcal</div>
        ${items.map(item => `
          <div class="log-item">
            <span>${item.emoji} ${item.name}</span>
            <div class="log-item-right">
              <span class="food-cal">${item.calories} kcal</span>
              <button class="remove-btn" onclick="removeItem(${item.id})">×</button>
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }).join("");
}

function switchTab(tab) {
  currentTab = tab;
  ["log", "today", "history", "ai"].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle("hidden", t !== tab);
  });
  document.querySelectorAll(".tab-btn").forEach((btn, i) => {
    btn.classList.toggle("active", ["log","today","history","ai"][i] === tab);
    btn.classList.toggle("inactive", ["log","today","history","ai"][i] !== tab);
  });
  if (tab === "today") renderToday();
  if (tab === "history") renderHistory();
}

function renderHistory() {
  const container = document.getElementById("history-content");
  const allDates = [...new Set(meals.map(m => m.date))].filter(d => d !== today()).sort((a, b) => {
    const parse = d => { const [dd,mm,yyyy] = d.split('/'); return new Date(yyyy,mm-1,dd); };
    return parse(b) - parse(a);
  });

  if (allDates.length === 0) {
    container.innerHTML = `<div class="empty">No previous days recorded yet.<br><span>Come back tomorrow!</span></div>`;
    return;
  }

  container.innerHTML = allDates.map((date, idx) => {
    const dayMeals = meals.filter(m => m.date === date);
    const total = dayMeals.reduce((s, m) => s + m.calories, 0);
    const pct = Math.min((total / DAILY_GOAL) * 100, 100);
    const color = pct >= 100 ? "#ef4444" : pct >= 80 ? "#f59e0b" : "#22c55e";
    const status = total > DAILY_GOAL ? "⚠️ Over" : total >= 1500 ? "✅ On track" : "⬇️ Under";

    const slotsHtml = MEAL_SLOTS.map(slot => {
      const items = dayMeals.filter(m => m.meal === slot);
      if (!items.length) return "";
      return `
        <div class="history-slot-label">${slot}</div>
        ${items.map(i => `
          <div class="history-item">
            <span>${i.emoji} ${i.name}</span>
            <span style="color:#4a9eff">${i.calories} kcal</span>
          </div>
        `).join("")}
      `;
    }).join("");

    return `
      <div class="history-day">
        <div class="history-day-header" onclick="toggleHistory(${idx})">
          <div>
            <div class="history-day-date">${date}</div>
            <div style="font-size:11px;color:#556;margin-top:2px">${status}</div>
          </div>
          <div style="text-align:right">
            <div class="history-day-total">${total} kcal</div>
            <div style="font-size:11px;color:#556">of ${DAILY_GOAL}</div>
          </div>
        </div>
        <div class="history-day-bar">
          <div class="history-day-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="history-day-meals" id="history-meals-${idx}">
          ${slotsHtml}
        </div>
      </div>
    `;
  }).join("");
}

function toggleHistory(idx) {
  const el = document.getElementById(`history-meals-${idx}`);
  el.classList.toggle("open");
}

async function askAI() {
  const input = document.getElementById("ai-input").value.trim();
  if (!input) return;
  const btn = document.getElementById("ai-btn");
  btn.disabled = true;
  btn.textContent = "Thinking...";
  document.getElementById("ai-response-box").classList.add("hidden");

  const total = totalToday();
  const remaining = DAILY_GOAL - total;
  const context = `You are a calorie counting assistant helping Gavin, a 6'3", 172kg Ghanaian man trying to lose weight due to high blood pressure. He is on Amlodipine 10mg. His daily calorie goal is 1,950 kcal. Today he has consumed ${total} kcal and has ${remaining} kcal remaining. His meals today: ${JSON.stringify(todayMeals().map(m => m.name + " (" + m.calories + " kcal)"))}. Keep responses concise and practical. He eats Ghanaian food.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: context,
        messages: [{ role: "user", content: input }]
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || "No response.";
    document.getElementById("ai-response-text").textContent = text;
    document.getElementById("ai-response-box").classList.remove("hidden");
  } catch (e) {
    document.getElementById("ai-response-text").textContent = "Error reaching AI. Try again.";
    document.getElementById("ai-response-box").classList.remove("hidden");
  }

  btn.disabled = false;
  btn.textContent = "Ask AI 🤖";
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add("hidden"), 2500);
}

// Init
document.getElementById("date-display").textContent = new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
renderMealSlots();
renderQuickFoods();
updateStats();
</script>

</body>
</html>
